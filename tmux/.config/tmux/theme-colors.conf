# Auto-generated from Omarchy theme: ethereal
# DO NOT EDIT - Changes will be overwritten on theme switch

# Status bar
set -g status-style "bg=#060B1E,fg=#ffcead"

# Pane borders
set -g pane-border-style "fg=#6d7db6"
set -g pane-active-border-style "fg=#a3bfd1"

# Window list formatting - number on accent, name on surface
set -g window-status-format "#[fg=#ffcead,bg=#6d7db6] #I #[fg=#ffcead,bg=#060B1E] #W "
set -g window-status-current-format "#[fg=#060B1E,bg=#a3bfd1,bold] #I #[fg=#a3bfd1,bg=#060B1E,bold] #W "

# Messages & popups
set -g message-style "bg=#060B1E,fg=#a3bfd1"
set -g popup-style "bg=#060B1E,fg=#ffcead"
set -g popup-border-style "fg=#a3bfd1"

# Status bar content using theme colors
set -g status-left "#[fg=#92a593,bold]#{session_name} #[fg=#7d82d9]| #[fg=#E9BB4F]#{pane_current_path} #[fg=#7d82d9]| "
set -g status-right "| #[fg=#7d82d9]#(uptime -p)"
